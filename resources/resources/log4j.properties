# Global logging configuration
#๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝฤผ๏ฟฝึปาช๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝclasspathฤฟยผ๏ฟฝะพ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝresources๏ฟฝ๏ฟฝ ฯตอณ๏ฟฝิถ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝาช๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝpom๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝlog4j๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ
log4j.rootLogger=ERROR, stdout
# MyBatis logging configuration...
log4j.logger.com.zhang.hospital.dao=DEBUG
# Console output...
log4j.appender.stdout=org.apache.log4j.ConsoleAppender
log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
log4j.appender.stdout.layout.ConversionPattern=%5p [%t] %m%n
 

